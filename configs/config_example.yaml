dataset:
  name: SKIRT_TNG                                        # (string in {'SKIRT_EPL','SKIRT_TNG'}): Name of the dataset to be used
  res: 64                                                # (int): Resolution of the images (number of pixels per side)

skirt_epl_dataset:

skirt_tng_dataset:
  save_path: ./data/dataset_skirt_tng                    # (string): Path where to save dataset
  train_split: 0.85                                      # (float in [0,1]): Fraction of dataset dedicated to training
  validation_split: 0.1                                  # (float in [0,1]): Fraction of dataset dedicated to validation
  test_split: 0.05                                       # (float in [0,1]): Fraction of dataset dedicated to testing
  sigma_y: 0.03                                          # (float): Standard deviation of Gaussian observational noise
  pixelscale: 0.12                                       # (float): Angular scale of one pixel in the lens plane [arcsec/pixel]
  source_pixelscale: 0.097                               # (float): Angular scale of one pixel in the source plane [arcsec/pixel]
  z_l: 0.5                                               # (float): Redshift of lens
  z_s: 1.0                                               # (float): Redshift of source
  psf_sigma: 0.12                                        # (float): Standard deviation of Gaussian PSF [arcsec]
  upsample_factor: 1                                     # (int): Upsampling factor for the PSF and the lensed image
  augment: true                                          # (bool): Whether to do source data augmentation (rotations and flips)

sde:
  space_kappa: log                                       # (string in {'linear','log'}): Space in which diffusion noise is added to kappa maps
  kind: VP_exp                                           # (string in {'VE','VP_linear','VP_exp'}): Choice of SDE (Variance exploding or Variance preserving) and noise schedule (linear or exponential)
  sigma_min:                                             # (float or none): Minimum noise scale in VE SDE
  sigma_max:                                             # (float or none): Maximum noise scale in VE SDE
  beta_min: 0.002                                        # (float or none): Minimum noise scale in VP SDE
  beta_max: 250                                          # (float or none): Maximum noise scale in VP SDE
  epsilon: 0.001                                         # (float in [0,1]): The diffusion process is limited to range [epsilon,1]

rim:
  num_iterations: 2                                      # (int): Number of iterations of the RIM at training and inference time
  model_channels: 64                                     # (int): Number of convolutional filters in first UNet level
  channel_mult: [1,2,4,8,8]                              # (list): Multiplier for number of convolutional filters across UNet levels
  num_blocks: 2                                          # (int): Number of residual blocks per UNet level
  attn_resolutions: [4,8]                                # (list): Resolutions at which self-attention is applied
  embedding_type: fourier                                # (string in {'positional','fourier'}): Timestep embedding type
  channel_mult_noise: 2                                  # (int): Timestep embedding size multiplier
  encoder_type: residual                                 # (string in {'standard','residual','skip'}): Encoder architecture
  decoder_type: standard                                 # (string in {'standard','skip'}): Decoder architecture
  resample_filter: [1,3,3,1]                             # (list): Resampling filter
  use_residuals: true                                    # (bool): Whether to take reconstruction residuals as additional input channel
  use_log_t: true                                        # (bool): Whether to take log of diffusion time as input to the model
  grad_lik:
    type: tanh                                           # (string in {'tanh','arcsinh','Adam'}): Type of likelihood gradient pre-processing
    grad_norm_source: 100                                # (float or none): Source gradient normalization value for tanh or arcsinh type
    grad_norm_kappa: 100                                 # (float or none): Kappa map gradient normalization value for tanh or arcsinh type
    adam_epsilon:                                        # (float or none): epsilon in Adam optimizer
    beta1:                                               # (float or none): beta1 in Adam optimizer
    beta2:                                               # (float or none): beta2 in Adam optimizer
  memory:
    type:                                                # (string in {'GRU','residual'} or none): Type of memory to use

training:
  batch_size: 16                                         # (int): Training batch size
  learning_rate: 2e-4                                    # (float): Training initial learning rate
  lr_decay: 1.0                                          # (float): Learning rate exponential decay rate per epoch
  dropout: 0                                             # (float in [0,1]): Dropout rate
  gradient_clipping: 10                                  # (float or none): Maximum gradient norm above which clipping is applied
  ema_decay: 0.0                                         # (float in [0,1]): Exponential moving average decay rate for weights
  num_epochs: 80                                         # (int): Number of epochs to train for
  patience: 80                                           # (int): Number of consecutive epochs without validation loss improvement needed to trigger early stopping
  resume_train: false                                    # (bool): Whether to continue training an existing model
  start_epoch: 0                                         # (int): Epoch at which to start training

loss:
  time_weights_cutoff: 0.02                              # (float): Cutoff for time weights in loss function
  kappa_weights: uniform                                 # (string in {'uniform','sqrt_kappa'}): Kappa map pixel weights in loss function
  iteration_weights: uniform                             # ('uniform' or list of floats): Relative weight of RIM iterations in loss function

sampling:
  model_epoch: 215                                       # (int): Number of epochs of training for the model to be used
  sampler_name: EM                                       # string in {'EM, Heun, Euler, RK4'}): Method for solving the reverse SDE
  num_steps: 1000                                        # (int): Number of time steps to take when solving the reverse SDE
  jump_to_0: true                                        # (bool): Whether to denoise the samples using the denoising model upon reaching t=epsilon
  n_corrector: 0                                         # (int): Number of corrector steps per predictor step
  snr: 0.1                                               # (float or none): Signal to noise ratio for corrector steps

tarp:
  n_samples: 128                                         # (int): Number of samples to generate per simulation
  n_sims: 128                                            # (int): Number of simulations to process
  num_alpha_bins: 30                                     # (int): Number of alpha bins in TARP plot
  norm: false                                            # (bool): Whether to normalize space in TARP plot
  references: prior                                      # (string in {'prior'}): Distribution to use to generate reference points

tests:
  sample_idxs: []                                    # (list of ints): Indices of samples in the test set to run tests on
  n_samples: 5                                         # (int): Number of samples to generate per test simulation
  batch_size: 5                                        # (int): Batch size to use at sampling time when running tests
